<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blue Box | Operador POS</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* IZQUIERDA: VIDEO */
        .left-panel { flex: 2; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #333; }
        .video-box { 
            width: 100%; max-width: 800px; aspect-ratio: 16/9; 
            background: #000; border: 3px solid #36ABD9; border-radius: 10px; overflow: hidden; position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* DERECHA: CAJA */
        .right-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #1a1a1a; }
        
        /* TARJETA ALUMNO */
        .student-card {
            background: #223D73; padding: 15px; border-radius: 10px; margin-bottom: 20px; opacity: 0.3; transition: opacity 0.3s;
        }
        .active-session { opacity: 1; box-shadow: 0 0 15px rgba(54, 171, 217, 0.4); }
        .student-name { font-size: 1.5em; font-weight: bold; margin: 0; }
        .student-balance { color: #F2921D; font-size: 1.2em; font-weight: bold; }

        /* GRID PRODUCTOS */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow-y: auto; flex-grow: 1; pointer-events: none; }
        .product-btn {
            background: #333; border: none; padding: 15px; border-radius: 8px; color: white; cursor: pointer; text-align: left; transition: transform 0.1s;
        }
        .product-btn:active { transform: scale(0.98); }
        .p-name { display: block; font-weight: bold; }
        .p-price { color: #aaa; font-size: 0.9em; }

        /* CARRITO */
        .cart-section { background: #000; padding: 15px; border-radius: 10px; margin-top: 20px; min-height: 150px; display: flex; flex-direction: column; }
        .cart-items { flex-grow: 1; font-size: 0.9em; color: #ccc; margin-bottom: 10px; overflow-y: auto; max-height: 100px; }
        .cart-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        
        .checkout-btn {
            background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 1.2em; font-weight: bold; cursor: pointer; opacity: 0.5; pointer-events: none;
        }
        .checkout-btn.enabled { opacity: 1; pointer-events: all; }
        .cancel-btn { background: #d9534f; margin-top: 5px; padding: 5px; border: none; color: white; border-radius: 4px; cursor: pointer; width: 100%;}

        /* ESTADO ACTIVO */
        .session-active .products-grid { pointer-events: all; }
        .session-active .product-btn { background: #444; }
        .session-active .product-btn:hover { background: #555; }
        
        /* Loading Overlay Video */
        .video-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; display: none;
        }
    </style>
</head>
<body class="">

    <div class="left-panel">
        <h2 style="margin-top:0">📹 Cámara en Vivo</h2>
        <div class="video-box">
            <video id="video" muted playsinline></video>
            <div id="videoOverlay" class="video-overlay" style="display: flex;">Esperando Cliente...</div>
            <div style="position:absolute; top:10px; right:10px; background:red; padding:2px 8px; border-radius:4px; font-size:12px;">LIVE</div>
        </div>
        <p id="statusText" style="color:#666; margin-top:10px;">⚪ Sistema desconectado</p>
    </div>

    <div class="right-panel">
        <div id="studentCard" class="student-card">
            <div style="font-size:0.8em; text-transform:uppercase; color:#aaa;">Cliente Actual</div>
            <h3 id="sName" class="student-name">--</h3>
            <div>Saldo: Bs <span id="sBalance">0.00</span></div>
        </div>

        <div class="products-grid">
            <button class="product-btn" onclick="addToCart('Coca-Cola', 10)">
                <span class="p-name">🥤 Coca-Cola</span>
                <span class="p-price">Bs 10.00</span>
            </button>
            <button class="product-btn" onclick="addToCart('Sandwich Pollo', 15)">
                <span class="p-name">🥪 Sandwich Pollo</span>
                <span class="p-price">Bs 15.00</span>
            </button>
            <button class="product-btn" onclick="addToCart('Galleta Oreo', 5)">
                <span class="p-name">🍪 Galletas</span>
                <span class="p-price">Bs 5.00</span>
            </button>
            <button class="product-btn" onclick="addToCart('Agua Vital', 8)">
                <span class="p-name">💧 Agua</span>
                <span class="p-price">Bs 8.00</span>
            </button>
        </div>

        <div class="cart-section">
            <div id="cartList" class="cart-items">
                <div style="text-align:center; padding-top:20px; color:#555;">Carrito Vacío</div>
            </div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px; font-size:1.2em;">
                <span>TOTAL:</span>
                <span>Bs <span id="cartTotal">0.00</span></span>
            </div>
            <button id="btnCheckout" class="checkout-btn" onclick="processCheckout()">COBRAR (Entregado)</button>
            <button id="btnCancel" class="cancel-btn" style="display:none;" onclick="resetSession()">Cancelar Sesión</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN ---
        const API_URL = "http://34.55.59.16:3000"; // Tu IP
        const STREAM_URL = "http://34.55.59.16/hls/stream.m3u8";

        const socket = io(API_URL);
        
        let currentSessionId = null;
        let cart = [];
        let total = 0;
        let hls = null; 

        const video = document.getElementById('video');
        const overlay = document.getElementById('videoOverlay');
        const statusText = document.getElementById('statusText');

        // --- 2. GESTIÓN DE VIDEO ---
        function resetVideoPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.removeAttribute('src');
            video.load();
            
            overlay.style.display = 'flex';
            overlay.innerText = 'Esperando Cliente...';
        }

        function playLiveStream() {
            const freshUrl = `${STREAM_URL}?t=${Date.now()}`;
            console.log("Iniciando video fresco:", freshUrl);

            overlay.innerText = 'Conectando Video...';

            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 5,
                    liveSyncDurationCount: 2,
                    manifestLoadingTimeOut: 10000
                });
                
                hls.loadSource(freshUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Interacción requerida:", e));
                    overlay.style.display = 'none'; // Ocultar overlay solo con éxito
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Esperando stream... Reintentando.");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                console.error("Error fatal de HLS. Destruyendo.");
                                resetVideoPlayer();
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = freshUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                    overlay.style.display = 'none';
                });
            }
        }

        // --- 3. SOCKET LÓGICA (NUEVO FLUJO) ---
        socket.on('connect', () => {
            statusText.innerText = "🟢 Sistema Listo. Esperando tarjeta...";
            socket.emit('join_operator');
        });

        // Servidor avisa que un cliente está escaneando su tarjeta
        socket.on('client_connecting', (data) => {
            statusText.innerText = `🟡 Handshake iniciado en máquina ${data.machineId}...`;
            overlay.style.display = 'flex';
            overlay.innerText = 'Esperando Fuente de Video...';
        });

        // El servidor ha verificado el video y nos da luz verde
        socket.on('video_verified_start_session', (data) => {
            console.log("CLIENTE VERIFICADO:", data);
            
            // 1. Mostrar datos y activar UI
            startSessionUI(data);

            // 2. Iniciar video (sin delay)
            playLiveStream();
        });

        // Compra finalizada
        socket.on('transaction_complete', (data) => {
            alert(`✅ Venta Exitosa\nCliente: ${data.studentName}\nTotal: Bs ${data.total}`);
            resetSession();
        });

        // --- 4. FUNCIONES DE UI ---
        function startSessionUI(data) {
            currentSessionId = data.sessionId;
            document.body.classList.add('session-active');
            
            document.getElementById('studentCard').classList.add('active-session');
            document.getElementById('sName').innerText = data.name;
            document.getElementById('sBalance').innerText = parseFloat(data.balance).toFixed(2);
            document.getElementById('btnCancel').style.display = 'block';
            statusText.innerText = `🟢 Sesión activa para ${data.name}`;
            
            new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(e=>{});
        }

        function addToCart(name, price) {
            if (!currentSessionId) return;
            cart.push({ name, price });
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartList');
            list.innerHTML = "";
            total = 0;

            cart.forEach((item) => {
                total += item.price;
                list.innerHTML += `<div class="cart-row"><span>${item.name}</span><span>Bs ${item.price.toFixed(2)}</span></div>`;
            });

            document.getElementById('cartTotal').innerText = total.toFixed(2);
            
            const btn = document.getElementById('btnCheckout');
            if(total > 0) btn.classList.add('enabled');
            else btn.classList.remove('enabled');
        }

        async function processCheckout() {
            if(!currentSessionId || total === 0) return;

            const btn = document.getElementById('btnCheckout');
            btn.innerText = "Procesando...";
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/api/checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: currentSessionId,
                        items: cart,
                        total: total
                    })
                });
                const res = await response.json();
                
                if(!res.success) {
                    alert("Error: " + res.error);
                    btn.innerText = "COBRAR (Entregado)";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Error de conexión al procesar el pago.");
                console.error(e);
                btn.innerText = "COBRAR (Entregado)";
                btn.disabled = false;
            }
        }

        function resetSession() {
            currentSessionId = null;
            cart = [];
            total = 0;
            
            document.body.classList.remove('session-active');
            document.getElementById('studentCard').classList.remove('active-session');
            document.getElementById('sName').innerText = "--";
            document.getElementById('sBalance').innerText = "0.00";
            document.getElementById('cartList').innerHTML = '<div style="text-align:center; padding-top:20px; color:#555;">Carrito Vacío</div>';
            document.getElementById('cartTotal').innerText = "0.00";
            document.getElementById('btnCancel').style.display = 'none';
            document.getElementById('btnCheckout').classList.remove('enabled');
            document.getElementById('btnCheckout').innerText = "COBRAR (Entregado)";
            document.getElementById('btnCheckout').disabled = false;
            statusText.innerText = "🟢 Sistema Listo. Esperando tarjeta...";

            resetVideoPlayer();
        }
        
        // Cargar estado inicial
        resetVideoPlayer();

    </script>
</body>
</html>
