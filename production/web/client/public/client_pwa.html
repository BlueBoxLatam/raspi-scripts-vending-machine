<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blue Box | PWA Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- QRCode Lib -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --blue-dark: #223D73;
            --blue-medium: #36ABD9;
            --blue-light: #62C3D9;
            --orange-vivid: #F2921D;
            --orange-soft: #F2BF5E;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
        }

        /* Glass Cards */
        .glass-card-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px -10px rgba(34, 61, 115, 0.15);
        }

        /* Vibrant Blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: var(--blue-medium);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: var(--blue-light);
            animation-delay: -5s;
        }

        .blob-3 {
            top: 40%;
            left: 40%;
            width: 40vw;
            height: 40vw;
            background: var(--orange-soft);
            opacity: 0.4;
            animation-delay: -2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden select-none flex flex-col relative">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Header -->
    <header class="w-full flex justify-between items-center px-10 py-8 z-10">
        <div class="flex items-center gap-4">
            <div class="bg-white p-3 rounded-2xl shadow-lg">
                <i class="fas fa-cube text-3xl text-[#223D73]"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-[#223D73]">BLUE<span
                        class="text-[#36ABD9]">BOX</span></h1>
            </div>
        </div>
        <div class="glass-card-light px-5 py-2 rounded-full flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 bg-red-500 rounded-full shadow-[0_0_10px_#ef4444]"></div>
            <span id="status-text" class="text-xs font-bold tracking-wider text-[#223D73]/70">OFFLINE</span>
        </div>
    </header>

    <!-- Main Content State Machine -->
    <main class="flex-grow w-full relative z-10 flex items-center justify-center p-8">

        <!-- 1. STANDBY STATE (QR CODE) -->
        <div id="state-standby"
            class="absolute inset-0 flex flex-col items-center justify-center text-center transition-all duration-500">
            <div
                class="glass-card-light p-10 rounded-[3rem] flex flex-col items-center justify-center relative overflow-hidden group shadow-2xl">

                <h2 class="text-3xl font-black text-[#223D73] mb-6">Escanea para Abrir</h2>

                <!-- QR Container -->
                <div class="bg-white p-4 rounded-3xl shadow-inner mb-6 relative">
                    <div id="qrcode" class="opacity-90"></div>

                    <!-- Logo Overlay -->
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div class="bg-white p-2 rounded-full shadow-md">
                            <i class="fas fa-cube text-2xl text-[#223D73]"></i>
                        </div>
                    </div>
                </div>

                <p class="text-sm font-bold uppercase tracking-widest text-[#223D73]/50">Usa la App Grabbie</p>

                <!-- Refresh Timer (Visual Only) -->
                <div class="w-full h-1 bg-gray-200 mt-6 rounded-full overflow-hidden">
                    <div class="h-full bg-[#36ABD9] animate-[width_30s_linear_infinite]"
                        style="animation-duration: 30s;"></div>
                </div>
            </div>
        </div>

        <!-- 2. SHOPPING STATE (Same as before) -->
        <div id="state-shopping"
            class="hidden absolute inset-0 flex flex-col items-center justify-center text-center transition-all duration-500 opacity-0 translate-y-10">
            <div class="glass-card-light w-full max-w-3xl p-6 rounded-[3rem] shadow-2xl relative overflow-hidden">
                <div
                    class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#223D73] via-[#36ABD9] to-[#F2921D]">
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-md">
                        <i class="fas fa-check text-3xl text-green-500"></i>
                    </div>
                    <h2 class="text-sm font-bold text-[#223D73]/60 uppercase tracking-widest mb-1">¡Hola!</h2>
                    <h3 id="user-name" class="text-4xl font-black text-[#223D73] mb-4 leading-tight">--</h3>
                    <div
                        class="bg-gradient-to-br from-[#223D73] to-[#1e3a8a] text-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
                        <p class="text-[10px] font-bold uppercase opacity-60 mb-2">Saldo Disponible</p>
                        <p class="text-6xl font-black tracking-tight">Bs <span id="user-balance"
                                class="text-[#F2921D]">0.00</span></p>
                    </div>
                </div>
            </div>
            <div class="mt-6 flex items-center gap-3 animate-pulse bg-white/40 px-6 py-3 rounded-full backdrop-blur-sm">
                <i class="fas fa-spinner fa-spin text-[#36ABD9]"></i>
                <p class="text-sm font-bold text-[#223D73]">Esperando selección...</p>
            </div>
        </div>

        <!-- 3. CHECKOUT STATE (Same as before) -->
        <div id="state-checkout"
            class="hidden absolute inset-0 flex flex-col items-center justify-center text-center transition-all duration-500 opacity-0 scale-95">
            <div
                class="bg-white w-full max-w-2xl p-10 rounded-[2.5rem] shadow-2xl relative z-20 border-t-8 border-green-500">
                <div class="mb-8">
                    <div class="mx-auto w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4">
                        <i class="fas fa-receipt text-3xl text-green-600"></i>
                    </div>
                    <h2 class="text-3xl font-black text-[#223D73]">¡Compra Lista!</h2>
                </div>
                <!-- ... (Shortened for brevity, same logic) ... -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center p-6 bg-slate-50 rounded-2xl">
                        <span class="text-sm font-bold uppercase text-slate-400">Total</span>
                        <span class="text-3xl font-black text-[#223D73]">Bs <span id="summary-total">0.00</span></span>
                    </div>
                    <div
                        class="flex justify-between items-center p-6 bg-[#F2921D]/10 rounded-2xl border border-[#F2921D]/20">
                        <span class="text-sm font-bold uppercase text-[#F2921D]">Saldo Restante</span>
                        <span class="text-3xl font-black text-[#F2921D]">Bs <span
                                id="summary-new-balance">0.00</span></span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // CONFIG
        const socket = io("https://api.grabbie.one", { transports: ['websocket', 'polling'] });

        // DOM
        const states = {
            standby: document.getElementById('state-standby'),
            shopping: document.getElementById('state-shopping'),
            checkout: document.getElementById('state-checkout')
        };
        const ui = {
            qrcode: document.getElementById('qrcode'),
            name: document.getElementById('user-name'),
            balance: document.getElementById('user-balance'),
            sumTotal: document.getElementById('summary-total'),
            sumBal: document.getElementById('summary-new-balance'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text')
        };

        let qrCodeObj = null;

        // HELPER: Generate QR
        function updateQRCode(token) {
            ui.qrcode.innerHTML = ""; // Clear
            qrCodeObj = new QRCode(ui.qrcode, {
                text: token,
                width: 200,
                height: 200,
                colorDark: "#223D73",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function switchState(targetKey) {
            Object.values(states).forEach(el => {
                el.classList.add('hidden', 'opacity-0', 'translate-y-10', 'scale-95');
                el.classList.remove('flex', 'opacity-100', 'translate-y-0', 'scale-100');
            });
            const target = states[targetKey];
            target.classList.remove('hidden');
            setTimeout(() => {
                target.classList.remove('opacity-0', 'translate-y-10', 'scale-95');
                target.classList.add('flex', 'opacity-100', 'translate-y-0', 'scale-100');
            }, 50);
        }

        // SOCKET
        socket.on('connect', () => {
            ui.statusDot.classList.replace('bg-red-500', 'bg-green-500');
            ui.statusText.innerText = "ONLINE";
            socket.emit('join_client');
        });

        socket.on('update_qr', (data) => {
            console.log("New QR Token:", data.token);
            updateQRCode(data.token);
            // Ensure we are in standby
            if (states.shopping.classList.contains('hidden') && states.checkout.classList.contains('hidden')) {
                switchState('standby');
            }
        });

        socket.on('client_welcome', (data) => {
            ui.name.innerText = data.name;
            ui.balance.innerText = Number(data.balance).toFixed(2);
            switchState('shopping');
        });

        socket.on('client_purchase_summary', (data) => {
            ui.sumTotal.innerText = Number(data.total).toFixed(2);
            ui.sumBal.innerText = Number(data.newBalance).toFixed(2);
            switchState('checkout');
        });

        socket.on('client_reset', () => {
            switchState('standby');
        });

        switchState('standby');
    </script>
</body>

</html>
