<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blue Box | Terminal Estudiantil</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --blue-dark: #223D73;
            --blue-medium: #36ABD9;
            --blue-light: #62C3D9;
            --orange-vivid: #F2921D;
            --orange-soft: #F2BF5E;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
        }

        /* Animación personalizada de flecha */
        @keyframes bounce-right {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(15px);
            }
        }

        .animate-point-right {
            animation: bounce-right 1.5s infinite ease-in-out;
        }

        /* Glass Cards for Light Theme */
        .glass-card-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px -10px rgba(34, 61, 115, 0.15);
        }

        /* Vibrant Blobs Background */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: var(--blue-medium);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: var(--blue-light);
            animation-delay: -5s;
        }

        .blob-3 {
            top: 40%;
            left: 40%;
            width: 40vw;
            height: 40vw;
            background: var(--orange-soft);
            opacity: 0.4;
            animation-delay: -2s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden select-none flex flex-col relative">

    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Header -->
    <header class="w-full flex justify-between items-center px-10 py-8 z-10">
        <div class="flex items-center gap-4">
            <div class="bg-white p-3 rounded-2xl shadow-lg">
                <i class="fas fa-cube text-3xl text-[#223D73]"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-[#223D73]">BLUE<span
                        class="text-[#36ABD9]">BOX</span></h1>
            </div>
        </div>
        <div class="glass-card-light px-5 py-2 rounded-full flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 bg-red-500 rounded-full shadow-[0_0_10px_#ef4444]"></div>
            <span id="status-text" class="text-xs font-bold tracking-wider text-[#223D73]/70">OFFLINE</span>
        </div>
    </header>

    <!-- Main Content State Machine -->
    <main class="flex-grow w-full relative z-10 flex items-center justify-center p-8">

        <!-- 1. STANDBY STATE (More White/Clean) -->
        <div id="state-standby"
            class="absolute inset-0 flex flex-col items-center justify-center text-center transition-all duration-500">
            <div class="relative w-full max-w-lg mb-12">
                <!-- Tarjeta Visual -->
                <div
                    class="glass-card-light p-12 rounded-[3rem] flex items-center justify-between relative overflow-hidden group">
                    <div class="text-left space-y-2 relative z-10">
                        <span class="text-sm font-bold uppercase tracking-widest text-[#223D73]/50">Para comenzar</span>
                        <h2 class="text-4xl font-black text-[#223D73]">Pase su<br>Tarjeta</h2>
                    </div>

                    <div class="w-24 h-24 bg-[#223D73] rounded-full flex items-center justify-center shadow-xl z-10">
                        <i class="fas fa-wifi text-4xl text-white rotate-90"></i>
                    </div>

                    <!-- Decorative Circle Inside -->
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-[#36ABD9]/20 rounded-full"></div>
                </div>

                <!-- Flecha Externa -->
                <div
                    class="absolute -right-24 top-1/2 -translate-y-1/2 flex flex-col items-center gap-2 animate-point-right">
                    <i class="fas fa-arrow-right text-6xl text-[#F2921D]"></i>
                    <span class="text-2xl font-black uppercase tracking-widest text-[#F2921D] mt-2">LECTOR</span>
                </div>
            </div>
        </div>

        <!-- 2. SHOPPING STATE (Vibrant Info) -->
        <div id="state-shopping"
            class="hidden absolute inset-0 flex flex-col items-center justify-center text-center transition-all duration-500 opacity-0 translate-y-10">
            <div class="glass-card-light w-full max-w-3xl p-6 rounded-[3rem] shadow-2xl relative overflow-hidden">
                <!-- Top Decoration -->
                <div
                    class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#223D73] via-[#36ABD9] to-[#F2921D]">
                </div>

                <div class="flex flex-col items-center">
                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-md">
                        <i class="fas fa-check text-3xl text-green-500"></i>
                    </div>

                    <h2 class="text-sm font-bold text-[#223D73]/60 uppercase tracking-widest mb-1">¡Hola!</h2>
                    <h3 id="user-name" class="text-4xl font-black text-[#223D73] mb-4 leading-tight">--</h3>

                    <div
                        class="bg-gradient-to-br from-[#223D73] to-[#1e3a8a] text-white rounded-3xl p-6 w-full max-w-md shadow-2xl transform scale-100">
                        <p class="text-[10px] font-bold uppercase opacity-60 mb-2">Saldo Disponible</p>
                        <p class="text-6xl font-black tracking-tight">Bs <span id="user-balance"
                                class="text-[#F2921D]">0.00</span></p>
                    </div>
                </div>
            </div>

            <div class="mt-6 flex items-center gap-3 animate-pulse bg-white/40 px-6 py-3 rounded-full backdrop-blur-sm">
                <i class="fas fa-spinner fa-spin text-[#36ABD9]"></i>
                <p class="text-sm font-bold text-[#223D73]">Esperando al operador...</p>
            </div>
        </div>

        <!-- 3. CHECKOUT STATE (Summary) -->
        <div id="state-checkout"
            class="hidden absolute inset-0 flex flex-col items-center justify-center text-center transition-all duration-500 opacity-0 scale-95">
            <div
                class="bg-white w-full max-w-2xl p-10 rounded-[2.5rem] shadow-2xl relative z-20 border-t-8 border-green-500">
                <div class="mb-8">
                    <div class="mx-auto w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4">
                        <i class="fas fa-receipt text-3xl text-green-600"></i>
                    </div>
                    <h2 class="text-3xl font-black text-[#223D73]">¡Compra Lista!</h2>
                    <p class="text-[#223D73]/60">Resumen de transacción</p>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center p-6 bg-slate-50 rounded-2xl">
                        <span class="text-sm font-bold uppercase text-slate-400">Total</span>
                        <span class="text-3xl font-black text-[#223D73]">Bs <span id="summary-total">0.00</span></span>
                    </div>
                    <div
                        class="flex justify-between items-center p-6 bg-[#F2921D]/10 rounded-2xl border border-[#F2921D]/20">
                        <span class="text-sm font-bold uppercase text-[#F2921D]">Saldo Restante</span>
                        <span class="text-3xl font-black text-[#F2921D]">Bs <span
                                id="summary-new-balance">0.00</span></span>
                    </div>
                </div>

                <div class="mt-8">
                    <p class="text-sm text-slate-400 font-medium">Gracias por tu compra</p>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer
        class="w-full flex justify-between items-center px-10 py-6 relative z-10 text-[#223D73]/40 text-xs font-bold tracking-widest">
        <div class="flex items-center gap-2">
            <i class="fas fa-lock"></i>
            <span>SECURE TERMINAL</span>
        </div>
        <div>ID: TB-01</div>
    </footer>

    <script>
        // CONFIGURACIÓN SOCKET
        const socket = io("https://api.grabbie.one", {
            transports: ['websocket', 'polling']
        });

        // DOM ELEMENTS
        const states = {
            standby: document.getElementById('state-standby'),
            shopping: document.getElementById('state-shopping'),
            checkout: document.getElementById('state-checkout')
        };

        const ui = {
            name: document.getElementById('user-name'),
            balance: document.getElementById('user-balance'),
            sumTotal: document.getElementById('summary-total'),
            sumBal: document.getElementById('summary-new-balance'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text')
        };

        // TRANSICIONES
        function switchState(targetKey) {
            // Ocultar todos
            Object.values(states).forEach(el => {
                el.classList.add('hidden', 'opacity-0', 'translate-y-10', 'scale-95');
                el.classList.remove('flex', 'opacity-100', 'translate-y-0', 'scale-100');
            });

            // Mostrar target
            const target = states[targetKey];
            target.classList.remove('hidden');

            // Timeout para efecto fade-in
            setTimeout(() => {
                target.classList.remove('opacity-0', 'translate-y-10', 'scale-95');
                target.classList.add('flex', 'opacity-100', 'translate-y-0', 'scale-100');
            }, 50);
        }

        // SOCKET LOGIC
        socket.on('connect', () => {
            console.log("Conectado al servidor");
            ui.statusDot.classList.remove('bg-red-500', 'shadow-[0_0_10px_#ef4444]');
            ui.statusDot.classList.add('bg-green-500', 'shadow-[0_0_10px_#22c55e]');
            ui.statusText.innerText = "ONLINE";
            socket.emit('join_client');
        });

        socket.on('disconnect', () => {
            console.log("Desconectado");
            ui.statusDot.classList.remove('bg-green-500', 'shadow-[0_0_10px_#22c55e]');
            ui.statusDot.classList.add('bg-red-500', 'shadow-[0_0_10px_#ef4444]');
            ui.statusText.innerText = "OFFLINE";
        });

        socket.on('connect_error', (err) => {
            console.error("Error conexión:", err);
            ui.statusDot.classList.remove('bg-green-500');
            ui.statusDot.classList.add('bg-red-500');
            ui.statusText.innerText = "ERR: " + err.message; // Mostrar error real
        });

        socket.on('client_welcome', (data) => {
            ui.name.innerText = data.name;
            // Formatear saldo a 2 decimales si viene como número
            ui.balance.innerText = Number(data.balance).toFixed(2);
            switchState('shopping');
        });

        socket.on('client_purchase_summary', (data) => {
            ui.sumTotal.innerText = Number(data.total).toFixed(2);
            ui.sumBal.innerText = Number(data.newBalance).toFixed(2);
            switchState('checkout');

            // Auto volver a standby
            setTimeout(() => {
                switchState('standby');
            }, 4000);
        });

        socket.on('client_reset', () => {
            switchState('standby');
        });

        // Inicio
        switchState('standby');
    </script>
</body>

</html>
